
<!DOCTYPE html><html lang="en"> 
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Builder (Grid)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="formscript.js" defer></script>
  <link href="formstyle.css" rel="stylesheet" type="text/css">
</head>
<body><div class="container-fluid builder-container p-3">
  <div class="row h-100 g-3"><!-- LEFT: PALETTE -->
<div class="col-3">
  <div class="panel p-3 h-100">
    <h5 class="mb-3">Fields</h5>
    <div class="palette-item" draggable="true" data-type="text">Text</div>
    <div class="palette-item" draggable="true" data-type="number">Number</div>
    <div class="palette-item" draggable="true" data-type="select">Select</div>
    <div class="palette-item" draggable="true" data-type="date">Date</div>

    <hr/>
    <h6>Layouts</h6>
    <button class="btn btn-outline-primary layout-btn" onclick="addRow([12])">1 Column</button>
    <button class="btn btn-outline-primary layout-btn" onclick="addRow([6,6])">2 Columns</button>
    <button class="btn btn-outline-primary layout-btn" onclick="addRow([4,4,4])">3 Columns</button>
  </div>
</div>

<!-- CENTER: CANVAS -->
<div class="col-6">
  <div class="panel p-3 h-100 d-flex flex-column">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Form Canvas</h5>
      <button class="btn btn-sm btn-primary" onclick="exportForm()">Export JSON</button>
    </div>
    <div id="canvas" class="flex-grow-1"></div>
  </div>
</div>

<!-- RIGHT: EDITOR -->
<div class="col-3">
  <div class="panel p-3 h-100 editor-panel">
    <h5 class="mb-3">Properties</h5>
    <div id="editor">Select a field</div>
  </div>
</div>

  </div>
</div>
</body>
</html>
